<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>我的贪吃蛇游戏</title>
    <style>
        body {
            background: linear-gradient(135deg, #3a506b, #5d7a9c);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
            font-family: Arial, sans-serif;
        }

        .game-container {
            text-align: center;
            margin: 20px;
        }

        canvas {
            border: 2px solid #fff;
            background: linear-gradient(135deg, #1a252f, #2c3e50);
            max-width: 100%;
            height: auto;
        }

        .size-controls {
            margin-top: 10px;
        }

        .size-btn {
            padding: 5px 10px;
            margin: 0 5px;
            background-color: #444;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .size-btn:hover {
            background-color: #666;
        }

        .info {
            color: #fff;
            margin-top: 10px;
            font-size: 20px;
        }

        button {
            margin-left: 20px;
            padding: 5px 10px;
            cursor: pointer;
        }

        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background-color: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .settings-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .settings-content {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            padding: 30px;
            border-radius: 10px;
            max-width: 400px;
            width: 90%;
            color: #fff;
        }

        .settings-title {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .skin-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .skin-option {
            padding: 10px 20px;
            border: 2px solid #fff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .skin-option:hover {
            transform: scale(1.05);
        }

        .skin-option.active {
            border-color: #00ff00;
            background-color: rgba(0, 255, 0, 0.2);
        }

        .close-settings {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background-color: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .close-settings:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <button class="settings-btn" onclick="openSettings()">⚙️ 设置</button>

    <div id="settingsModal" class="settings-modal">
        <div class="settings-content">
            <h2 class="settings-title">游戏设置</h2>
            <p style="margin-bottom: 10px;">选择蛇的皮肤：</p>
            <div class="skin-options">
                <div class="skin-option active" onclick="changeSkin('white', this)" style="color: #fff;">雪白</div>
                <div class="skin-option" onclick="changeSkin('yellow', this)" style="color: #ffeb3b;">金黄</div>
                <div class="skin-option" onclick="changeSkin('pink', this)" style="color: #ff69b4;">粉红</div>
                <div class="skin-option" onclick="changeSkin('cyan', this)" style="color: #00ffff;">青色</div>
                <div class="skin-option" onclick="changeSkin('orange', this)" style="color: #ffa500;">橙色</div>
            </div>
            <button class="close-settings" onclick="closeSettings()">关闭</button>
        </div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="size-controls">
            <button class="size-btn" onclick="changeSize(15)">较小</button>
            <button class="size-btn" onclick="changeSize(20)">中</button>
            <button class="size-btn" onclick="changeSize(25)">较大</button>
            <button class="size-btn" onclick="changeSize(30)">最大</button>
        </div>
        <div class="info">
            分数: <span id="score">0</span>
            <button id="restartBtn">重新开始</button>
        </div>
    </div>

    <audio id="eatSound" preload="auto">
        <source src="eat.mp3" type="audio/mpeg">
    </audio>
    <audio id="gameOverSound" preload="auto">
        <source src="gameover.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const eatSound = document.getElementById('eatSound');
        const gameOverSound = document.getElementById('gameOverSound');

        const gridSize = 20;
        let tileSize = 20;

        let snake = [];
        let direction = [1, 0];
        let food = {};
        let score = 0;
        let gameSpeed = 150;
        let lastMoveTime = 0;
        let gameRunning = false;
        let gamePaused = false;
        let animationId = null;

        // 方向输入队列：支持快速连续输入，例如 W 然后 A
        let directionQueue = [];

        const skins = {
            white: { head: '#e0e0e0', body: '#ffffff' },
            yellow: { head: '#ffc107', body: '#ffeb3b' },
            pink: { head: '#ff1493', body: '#ff69b4' },
            cyan: { head: '#00ced1', body: '#00ffff' },
            orange: { head: '#ff8c00', body: '#ffa500' }
        };

        let currentSkin = 'white';

        function sameDir(a, b) {
            return a[0] === b[0] && a[1] === b[1];
        }

        function isOppositeDir(a, b) {
            return a[0] === -b[0] && a[1] === -b[1];
        }

        function getLastPlannedDirection() {
            return directionQueue.length > 0 ? directionQueue[directionQueue.length - 1] : direction;
        }

        function enqueueDirection(newDir) {
            const lastPlanned = getLastPlannedDirection();

            // 连续相同方向不进队
            if (sameDir(newDir, lastPlanned)) return;

            // 不能直接反向
            if (isOppositeDir(newDir, lastPlanned)) return;

            // 队列别太长，2~3 个足够了
            if (directionQueue.length < 3) {
                directionQueue.push(newDir);
            }
        }

        function initGame() {
            snake = [[10, 10], [9, 10], [8, 10]];
            direction = [1, 0];
            directionQueue = [];
            score = 0;
            scoreElement.innerText = score;
            gameSpeed = 150;
            gameRunning = true;
            gamePaused = false;
            lastMoveTime = 0;
            generateFood();

            canvas.width = gridSize * tileSize;
            canvas.height = gridSize * tileSize;

            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            animationId = requestAnimationFrame(gameLoop);
        }

        function gameLoop(currentTime) {
            if (!gameRunning) return;

            // 暂停时仍然维持动画循环，只是不移动
            if (!gamePaused) {
                if (currentTime - lastMoveTime >= gameSpeed) {
                    lastMoveTime = currentTime;

                    if (directionQueue.length > 0) {
                        direction = directionQueue.shift();
                    }

                    move();
                }
            }

            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function generateFood(playSound = false) {
            let newFood;
            let onSnake;

            do {
                newFood = {
                    x: Math.floor(Math.random() * gridSize),
                    y: Math.floor(Math.random() * gridSize)
                };
                onSnake = snake.some(seg => seg[0] === newFood.x && seg[1] === newFood.y);
            } while (onSnake);

            food = newFood;

            // 只在真正吃到食物时播放，不在初始化时播放
            if (playSound) {
                eatSound.currentTime = 0;
                eatSound.play().catch(() => {});
            }
        }

        function move() {
            const head = snake[0];
            const newHead = [head[0] + direction[0], head[1] + direction[1]];

            // 边界碰撞
            if (
                newHead[0] < 0 || newHead[0] >= gridSize ||
                newHead[1] < 0 || newHead[1] >= gridSize
            ) {
                return gameOver();
            }

            const isEating = newHead[0] === food.x && newHead[1] === food.y;

            // 修复自撞判定：
            // 如果这一步没吃到食物，尾巴会移动，所以检查时应忽略最后一节尾巴
            const bodyToCheck = isEating ? snake : snake.slice(0, -1);

            if (bodyToCheck.some(seg => seg[0] === newHead[0] && seg[1] === newHead[1])) {
                return gameOver();
            }

            snake.unshift(newHead);

            if (isEating) {
                score += 10;
                scoreElement.innerText = score;
                generateFood(true);
            } else {
                snake.pop();
            }
        }

        function gameOver() {
            gameRunning = false;
            gamePaused = false;

            gameOverSound.currentTime = 0;
            gameOverSound.play().catch(() => {});

            setTimeout(() => {
                alert(`游戏结束！得分：${score}`);
            }, 10);
        }

        function draw() {
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#1a252f');
            gradient.addColorStop(1, '#2c3e50');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#3d566e';
            ctx.lineWidth = 1;
            for (let i = 0; i <= gridSize; i++) {
                ctx.beginPath();
                ctx.moveTo(i * tileSize, 0);
                ctx.lineTo(i * tileSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * tileSize);
                ctx.lineTo(canvas.width, i * tileSize);
                ctx.stroke();
            }

            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            const centerX = food.x * tileSize + tileSize / 2;
            const centerY = food.y * tileSize + tileSize / 2;
            ctx.arc(centerX, centerY, tileSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            snake.forEach((segment, index) => {
                ctx.fillStyle = (index === 0) ? skins[currentSkin].head : skins[currentSkin].body;
                ctx.fillRect(
                    segment[0] * tileSize + 1,
                    segment[1] * tileSize + 1,
                    tileSize - 2,
                    tileSize - 2
                );

                if (index === 0) {
                    ctx.fillStyle = '#000';

                    if (direction[0] === 1) {
                        ctx.fillRect(segment[0] * tileSize + 12, segment[1] * tileSize + 5, 3, 3);
                        ctx.fillRect(segment[0] * tileSize + 12, segment[1] * tileSize + 12, 3, 3);
                    } else if (direction[0] === -1) {
                        ctx.fillRect(segment[0] * tileSize + 5, segment[1] * tileSize + 5, 3, 3);
                        ctx.fillRect(segment[0] * tileSize + 5, segment[1] * tileSize + 12, 3, 3);
                    } else if (direction[1] === -1) {
                        ctx.fillRect(segment[0] * tileSize + 5, segment[1] * tileSize + 5, 3, 3);
                        ctx.fillRect(segment[0] * tileSize + 12, segment[1] * tileSize + 5, 3, 3);
                    } else if (direction[1] === 1) {
                        ctx.fillRect(segment[0] * tileSize + 5, segment[1] * tileSize + 12, 3, 3);
                        ctx.fillRect(segment[0] * tileSize + 12, segment[1] * tileSize + 12, 3, 3);
                    }
                }
            });

            // 暂停遮罩
            if (gamePaused && gameRunning) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#fff';
                ctx.font = `bold ${Math.max(24, tileSize * 1.2)}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('已暂停', canvas.width / 2, canvas.height / 2);
            }
        }

        function changeSize(newTileSize) {
            tileSize = newTileSize;
            canvas.width = gridSize * tileSize;
            canvas.height = gridSize * tileSize;

            if (gameRunning) {
                draw();
            }
        }

        function changeSkin(skinName, el) {
            currentSkin = skinName;

            document.querySelectorAll('.skin-option').forEach(item => {
                item.classList.remove('active');
            });

            if (el) {
                el.classList.add('active');
            }

            if (gameRunning) {
                draw();
            }
        }

        function openSettings() {
            if (!gameRunning) return;
            gamePaused = true;
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function closeSettings() {
            document.getElementById('settingsModal').style.display = 'none';

            if (gameRunning) {
                gamePaused = false;
                // 防止恢复时因为时间差导致立刻多走一步
                lastMoveTime = performance.now();
            }
        }

        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            if (!gameRunning || gamePaused) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 0) enqueueDirection([1, 0]);
                else enqueueDirection([-1, 0]);
            } else {
                if (deltaY > 0) enqueueDirection([0, 1]);
                else enqueueDirection([0, -1]);
            }
        });

        document.addEventListener('keydown', function(event) {
            if (!gameRunning || gamePaused) return;

            const key = event.key.toLowerCase();
            let newDir = null;

            if (key === 'w' || key === 'arrowup') newDir = [0, -1];
            else if (key === 's' || key === 'arrowdown') newDir = [0, 1];
            else if (key === 'a' || key === 'arrowleft') newDir = [-1, 0];
            else if (key === 'd' || key === 'arrowright') newDir = [1, 0];

            if (newDir) {
                event.preventDefault();
                enqueueDirection(newDir);
            }
        });

        document.getElementById('restartBtn').addEventListener('click', initGame);

        initGame();
    </script>
</body>
</html>
