<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>我的贪吃蛇游戏</title>
    <style>
        /* 禁用页面滚动，但保留触屏事件 */
        body {
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
            font-family: Arial, sans-serif;
        }

        /* 游戏容器样式 */
        .game-container {
            text-align: center;
            margin: 20px;
        }

        /* 画布样式 */
        canvas {
            border: 2px solid #fff;
            background-color: #000;
            max-width: 100%;
            height: auto;
        }

        /* 调整大小按钮样式 */
        .size-controls {
            margin-top: 10px;
        }

        .size-btn {
            padding: 5px 10px;
            margin: 0 5px;
            background-color: #444;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .size-btn:hover {
            background-color: #666;
        }

        /* 分数和按钮样式 */
        .info {
            color: #fff;
            margin-top: 10px;
            font-size: 20px;
        }

        button {
            margin-left: 20px;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="size-controls">
            <button class="size-btn" onclick="changeSize(20)">小</button>
            <button class="size-btn" onclick="changeSize(25)">中</button>
            <button class="size-btn" onclick="changeSize(30)">大</button>
        </div>
        <div class="info">
            分数: <span id="score">0</span>
            <button id="restartBtn">重新开始</button>
        </div>
    </div>

    <script>
        // ===== 1. 游戏初始化 =====
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        
        const gridSize = 20;
        let tileSize = 20; // 初始大小
        
        let snake = [];
        let direction = [];
        let nextDirection = [];
        let food = {};
        let score = 0;
        let gameSpeed = 150;
        let lastMoveTime = 0;
        let gameRunning = false;

        // ===== 2. 初始化游戏 =====
        function initGame() {
            snake = [[10, 10], [9, 10], [8, 10]];
            direction = [1, 0];
            nextDirection = [1, 0];
            score = 0;
            scoreElement.innerText = score;
            gameSpeed = 150;
            gameRunning = true;
            lastMoveTime = 0;
            generateFood();
            
            // 设置画布大小
            canvas.width = gridSize * tileSize;
            canvas.height = gridSize * tileSize;
            
            // 启动高级动画循环
            requestAnimationFrame(gameLoop);
        }

        // ===== 3. 高级游戏循环 =====
        function gameLoop(currentTime) {
            if (!gameRunning) return;

            if (currentTime - lastMoveTime >= gameSpeed) {
                lastMoveTime = currentTime;
                direction = nextDirection;
                move();
            }
            
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ===== 4. 生成食物 =====
        function generateFood() {
            let newFood;
            let onSnake;
            do {
                newFood = {
                    x: Math.floor(Math.random() * gridSize),
                    y: Math.floor(Math.random() * gridSize)
                };
                onSnake = snake.some(seg => seg[0] === newFood.x && seg[1] === newFood.y);
            } while (onSnake);
            
            food = newFood;
        }

        // ===== 5. 移动逻辑 =====
        function move() {
            const head = snake[0];
            const newHead = [head[0] + direction[0], head[1] + direction[1]];

            if (newHead[0] < 0 || newHead[0] >= gridSize || 
                newHead[1] < 0 || newHead[1] >= gridSize) {
                return gameOver();
            }
            if (snake.some(seg => seg[0] === newHead[0] && seg[1] === newHead[1])) {
                return gameOver();
            }

            snake.unshift(newHead);

            if (newHead[0] === food.x && newHead[1] === food.y) {
                score += 10;
                scoreElement.innerText = score;
                if (gameSpeed > 50) gameSpeed -= 2;
                generateFood();
            } else {
                snake.pop();
            }
        }

        // ===== 6. 绘制函数 =====
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            for (let i = 0; i <= gridSize; i++) {
                ctx.beginPath();
                ctx.moveTo(i * tileSize, 0);
                ctx.lineTo(i * tileSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * tileSize);
                ctx.lineTo(canvas.width, i * tileSize);
                ctx.stroke();
            }

            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            const centerX = food.x * tileSize + tileSize / 2;
            const centerY = food.y * tileSize + tileSize / 2;
            ctx.arc(centerX, centerY, tileSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            snake.forEach((segment, index) => {
                ctx.fillStyle = (index === 0) ? '#00cc00' : '#00ff00';
                ctx.fillRect(
                    segment[0] * tileSize + 1, 
                    segment[1] * tileSize + 1, 
                    tileSize - 2, 
                    tileSize - 2
                );

                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    let eyeOffsetX = 5;
                    let eyeOffsetY = 5;
                    if (direction[0] === 1) eyeOffsetX = 12;
                    if (direction[1] === 1) eyeOffsetY = 12;
                    
                    ctx.fillRect(segment[0] * tileSize + eyeOffsetX, segment[1] * tileSize + 5, 3, 3);
                    ctx.fillRect(segment[0] * tileSize + eyeOffsetX, segment[1] * tileSize + 12, 3, 3);
                }
            });
        }

        // ===== 7. 游戏结束 =====
        function gameOver() {
            gameRunning = false;
            setTimeout(() => {
                alert(`游戏结束！得分：${score}`);
            }, 10);
        }

        // ===== 8. 调整游戏大小 =====
        function changeSize(newTileSize) {
            tileSize = newTileSize;
            canvas.width = gridSize * tileSize;
            canvas.height = gridSize * tileSize;
            
            if (gameRunning) {
                draw();
            }
        }

        // ===== 9. 禁用页面滚动 =====
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // ===== 10. 触屏控制 =====
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 0) {
                    if (direction[0] !== -1) nextDirection = [1, 0];
                } else {
                    if (direction[0] !== 1) nextDirection = [-1, 0];
                }
            } else {
                if (deltaY > 0) {
                    if (direction[1] !== -1) nextDirection = [0, 1];
                } else {
                    if (direction[1] !== 1) nextDirection = [0, -1];
                }
            }
        });

        // ===== 11. 键盘控制 =====
        document.addEventListener('keydown', function(event) {
            if (!gameRunning) return;
            
            const key = event.key.toLowerCase();
            let newDir = null;

            if (key === 'w' || key === 'arrowup') newDir = [0, -1];
            else if (key === 's' || key === 'arrowdown') newDir = [0, 1];
            else if (key === 'a' || key === 'arrowleft') newDir = [-1, 0];
            else if (key === 'd' || key === 'arrowright') newDir = [1, 0];

            if (newDir && (newDir[0] !== -direction[0] || newDir[1] !== -direction[1])) {
                nextDirection = newDir;
            }
        });

        // 重新开始按钮
        document.getElementById('restartBtn').addEventListener('click', initGame);

        // ===== 启动！=====
        initGame();
    </script>
</body>
</html>
