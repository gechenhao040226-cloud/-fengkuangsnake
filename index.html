<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>我的贪吃蛇游戏</title>
    <style>
        /* 禁用页面滚动，但保留触屏事件 */
        body {
            background: linear-gradient(135deg, #3a506b, #5d7a9c); /* 稍微浅一点的蓝灰色渐变背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
            font-family: Arial, sans-serif;
        }

        /* 游戏容器样式 */
        .game-container {
            text-align: center;
            margin: 20px;
        }

        /* 画布样式 */
        canvas {
            border: 2px solid #fff;
            background: linear-gradient(135deg, #1a252f, #2c3e50); /* 深色渐变背景 */
            max-width: 100%;
            height: auto;
        }

        /* 调整大小按钮样式 */
        .size-controls {
            margin-top: 10px;
        }

        .size-btn {
            padding: 5px 10px;
            margin: 0 5px;
            background-color: #444;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .size-btn:hover {
            background-color: #666;
        }

        /* 分数和按钮样式 */
        .info {
            color: #fff;
            margin-top: 10px;
            font-size: 20px;
        }

        button {
            margin-left: 20px;
            padding: 5px 10px;
            cursor: pointer;
        }

        /* 设置按钮 */
        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background-color: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .settings-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        /* 设置弹窗 */
        .settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .settings-content {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            padding: 30px;
            border-radius: 10px;
            max-width: 400px;
            width: 90%;
            color: #fff;
        }

        .settings-title {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .skin-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .skin-option {
            padding: 10px 20px;
            border: 2px solid #fff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .skin-option:hover {
            transform: scale(1.05);
        }

        .skin-option.active {
            border-color: #00ff00;
            background-color: rgba(0, 255, 0, 0.2);
        }

        .close-settings {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background-color: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .close-settings:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <!-- 设置按钮 -->
    <button class="settings-btn" onclick="openSettings()">⚙️ 设置</button>

    <!-- 设置弹窗 -->
    <div id="settingsModal" class="settings-modal">
        <div class="settings-content">
            <h2 class="settings-title">游戏设置</h2>
            <p style="margin-bottom: 10px;">选择蛇的皮肤：</p>
            <div class="skin-options">
                <div class="skin-option" onclick="changeSkin('white')" style="color: #fff;">雪白</div>
                <div class="skin-option" onclick="changeSkin('yellow')" style="color: #ffeb3b;">金黄</div>
                <div class="skin-option" onclick="changeSkin('pink')" style="color: #ff69b4;">粉红</div>
                <div class="skin-option" onclick="changeSkin('cyan')" style="color: #00ffff;">青色</div>
                <div class="skin-option" onclick="changeSkin('orange')" style="color: #ffa500;">橙色</div>
            </div>
            <button class="close-settings" onclick="closeSettings()">关闭</button>
        </div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="size-controls">
            <button class="size-btn" onclick="changeSize(15)">较小</button>
            <button class="size-btn" onclick="changeSize(20)">中</button>
            <button class="size-btn" onclick="changeSize(25)">较大</button>
            <button class="size-btn" onclick="changeSize(30)">最大</button>
        </div>
        <div class="info">
            分数: <span id="score">0</span>
            <button id="restartBtn">重新开始</button>
        </div>
    </div>

    <script>
        // ===== 1. 游戏初始化 =====
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        
        const gridSize = 20;
        let tileSize = 20; // 初始大小
        
        let snake = [];
        let direction = [];
        let nextDirection = [];
        let food = {};
        let score = 0;
        let gameSpeed = 150;
        let lastMoveTime = 0;
        let gameRunning = false;

        // 皮肤颜色配置
        const skins = {
            default: { head: '#00cc00', body: '#00ff00' },
            white: { head: '#e0e0e0', body: '#ffffff' },
            yellow: { head: '#ffc107', body: '#ffeb3b' },
            pink: { head: '#ff1493', body: '#ff69b4' },
            cyan: { head: '#00ced1', body: '#00ffff' },
            orange: { head: '#ff8c00', body: '#ffa500' }
        };

        let currentSkin = 'default';

        // ===== 2. 初始化游戏 =====
        function initGame() {
            snake = [[10, 10], [9, 10], [8, 10]];
            direction = [1, 0];
            nextDirection = [1, 0];
            score = 0;
            scoreElement.innerText = score;
            gameSpeed = 150;
            gameRunning = true;
            lastMoveTime = 0;
            generateFood();
            
            // 设置画布大小
            canvas.width = gridSize * tileSize;
            canvas.height = gridSize * tileSize;
            
            // 启动高级动画循环
            requestAnimationFrame(gameLoop);
        }

        // ===== 3. 高级游戏循环 =====
        function gameLoop(currentTime) {
            if (!gameRunning) return;

            if (currentTime - lastMoveTime >= gameSpeed) {
                lastMoveTime = currentTime;
                direction = nextDirection;
                move();
            }
            
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ===== 4. 生成食物 =====
        function generateFood() {
            let newFood;
            let onSnake;
            do {
                newFood = {
                    x: Math.floor(Math.random() * gridSize),
                    y: Math.floor(Math.random() * gridSize)
                };
                onSnake = snake.some(seg => seg[0] === newFood.x && seg[1] === newFood.y);
            } while (onSnake);
            
            food = newFood;
        }

        // ===== 5. 移动逻辑 =====
        function move() {
            const head = snake[0];
            const newHead = [head[0] + direction[0], head[1] + direction[1]];

            if (newHead[0] < 0 || newHead[0] >= gridSize || 
                newHead[1] < 0 || newHead[1] >= gridSize) {
                return gameOver();
            }
            if (snake.some(seg => seg[0] === newHead[0] && seg[1] === newHead[1])) {
                return gameOver();
            }

            snake.unshift(newHead);

            if (newHead[0] === food.x && newHead[1] === food.y) {
                score += 10;
                scoreElement.innerText = score;
                if (gameSpeed > 50) gameSpeed -= 2;
                generateFood();
            } else {
                snake.pop();
            }
        }

        // ===== 6. 绘制函数 =====
        function draw() {
            // 绘制渐变背景
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#1a252f');
            gradient.addColorStop(1, '#2c3e50');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格线
            ctx.strokeStyle = '#3d566e';
            ctx.lineWidth = 1;
            for (let i = 0; i <= gridSize; i++) {
                ctx.beginPath();
                ctx.moveTo(i * tileSize, 0);
                ctx.lineTo(i * tileSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * tileSize);
                ctx.lineTo(canvas.width, i * tileSize);
                ctx.stroke();
            }

            // 绘制食物
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            const centerX = food.x * tileSize + tileSize / 2;
            const centerY = food.y * tileSize + tileSize / 2;
            ctx.arc(centerX, centerY, tileSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // 绘制蛇
            snake.forEach((segment, index) => {
                ctx.fillStyle = (index === 0) ? skins[currentSkin].head : skins[currentSkin].body;
                ctx.fillRect(
                    segment[0] * tileSize + 1, 
                    segment[1] * tileSize + 1, 
                    tileSize - 2, 
                    tileSize - 2
                );

                if (index === 0) {
                    ctx.fillStyle = '#000'; // 深色眼睛更清晰
                    let eyeOffsetX = 5;
                    let eyeOffsetY = 5;
                    if (direction[0] === 1) eyeOffsetX = 12;
                    if (direction[1] === 1) eyeOffsetY = 12;
                    
                    ctx.fillRect(segment[0] * tileSize + eyeOffsetX, segment[1] * tileSize + 5, 3, 3);
                    ctx.fillRect(segment[0] * tileSize + eyeOffsetX, segment[1] * tileSize + 12, 3, 3);
                }
            });
        }

        // ===== 7. 游戏结束 =====
        function gameOver() {
            gameRunning = false;
            setTimeout(() => {
                alert(`游戏结束！得分：${score}`);
            }, 10);
        }

        // ===== 8. 调整游戏大小 =====
        function changeSize(newTileSize) {
            tileSize = newTileSize;
            canvas.width = gridSize * tileSize;
            canvas.height = gridSize * tileSize;
            
            if (gameRunning) {
                draw();
            }
        }

        // ===== 9. 更改皮肤 =====
        function changeSkin(skinName) {
            currentSkin = skinName;
            
            // 更新选中状态
            document.querySelectorAll('.skin-option').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            
            // 立即重绘
            if (gameRunning) {
                draw();
            }
        }

        // ===== 10. 打开设置 =====
        function openSettings() {
            document.getElementById('settingsModal').style.display = 'flex';
        }

        // ===== 11. 关闭设置 =====
        function closeSettings() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        // ===== 12. 禁用页面滚动 =====
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // ===== 13. 触屏控制 =====
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 0) {
                    if (direction[0] !== -1) nextDirection = [1, 0];
                } else {
                    if (direction[0] !== 1) nextDirection = [-1, 0];
                }
            } else {
                if (deltaY > 0) {
                    if (direction[1] !== -1) nextDirection = [0, 1];
                } else {
                    if (direction[1] !== 1) nextDirection = [0, -1];
                }
            }
        });

        // ===== 14. 键盘控制 =====
        document.addEventListener('keydown', function(event) {
            if (!gameRunning) return;
            
            const key = event.key.toLowerCase();
            let newDir = null;

            if (key === 'w' || key === 'arrowup') newDir = [0, -1];
            else if (key === 's' || key === 'arrowdown') newDir = [0, 1];
            else if (key === 'a' || key === 'arrowleft') newDir = [-1, 0];
            else if (key === 'd' || key === 'arrowright') newDir = [1, 0];

            if (newDir && (newDir[0] !== -direction[0] || newDir[1] !== -direction[1])) {
                nextDirection = newDir;
            }
        });

        // 重新开始按钮
        document.getElementById('restartBtn').addEventListener('click', initGame);

    </script>
</body>
</html>


        // ===== 启动！=====
        initGame();
    </script>
</body>
</html>
